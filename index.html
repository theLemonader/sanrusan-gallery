<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SANRUSAN — Functional Art</title>
<meta name="description" content="A gallery of functional art — pieces that are art on one side and functional on the other." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ffffff;
    --ink-soft: rgba(255, 255, 255, 0.78);
    --rule: rgba(255, 255, 255, 0.55);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Inter Tight', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  .video-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -3;
  }

  /* Subtle gradient + vignette so white text always reads cleanly */
  .scrim {
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 35%, rgba(0,0,0,0.45) 100%);
  }

  /* Faint film grain for that gallery print feel */
  .grain {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
  }

  .frame {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2.5rem;
  }

  /* hairline marker above logo */
  .mark {
    width: 28px;
    height: 1px;
    background: var(--rule);
    margin-bottom: 2.25rem;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.1s forwards;
  }

  .logo {
    font-family: 'Inter Tight', sans-serif;
    font-weight: 700;
    font-size: clamp(3.25rem, 13vw, 10rem);
    letter-spacing: -0.065em;
    line-height: 0.95;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0;
    transform: translateY(8px);
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.25s forwards;
  }

  .tagline {
    margin-top: 1.5rem;
    font-family: 'Instrument Serif', 'Times New Roman', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.15rem, 2.2vw, 1.65rem);
    letter-spacing: 0.01em;
    color: var(--ink);
    opacity: 0;
    transform: translateY(8px);
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.5s forwards;
  }

  .rule {
    width: 56px;
    height: 1px;
    background: var(--rule);
    margin: 2.25rem 0 2rem;
    opacity: 0;
    animation: fadeIn 1.2s ease 0.7s forwards;
  }

  .statement {
    font-family: 'Instrument Serif', 'Times New Roman', serif;
    font-weight: 400;
    font-size: clamp(1rem, 1.5vw, 1.35rem);
    line-height: 1.55;
    letter-spacing: 0.005em;
    max-width: 38rem;
    color: var(--ink-soft);
    opacity: 0;
    transform: translateY(8px);
    animation: rise 1.2s cubic-bezier(.2,.7,.2,1) 0.85s forwards;
  }

  .statement em {
    font-style: italic;
    color: var(--ink);
  }

  /* Footer mark — quiet gallery signature */
  .footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 1.75rem;
    display: flex;
    justify-content: space-between;
    padding: 0 2rem;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-soft);
    opacity: 0;
    animation: fadeIn 1.4s ease 1.2s forwards;
  }

  .footer span:last-child { letter-spacing: 0.18em; }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @media (max-width: 480px) {
    .footer { font-size: 0.6rem; padding: 0 1.25rem; }
    .rule { margin: 1.75rem 0 1.5rem; }
  }
</style>
</head>
<body>
  <video class="video-bg" autoplay muted loop playsinline preload="auto" poster="">
    <source src="sanrusan.mp4" type="video/mp4" />
  </video>
  <div class="scrim"></div>
  <div class="grain"></div>

  <main class="frame">
    <span class="mark" aria-hidden="true"></span>
    <h1 class="logo">SANRUSAN</h1>
    <p class="tagline">functional art</p>
    <span class="rule" aria-hidden="true"></span>
    <p class="statement">
      Objects that hold two truths at once — <em>art</em> on one side,
      <em>function</em> on the other. A gallery for pieces that refuse to choose.
    </p>
  </main>

  <footer class="footer">
    <span>SANRUSAN</span>
    <span>Gallery — Est. 2026</span>
  </footer>
</body>
</html>
