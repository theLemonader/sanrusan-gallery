<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>SANRUSAN — Functional Art</title>
<meta name="description" content="A gallery of functional art — pieces that are art on one side and functional on the other." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #ffffff;
    --ink-soft: rgba(255, 255, 255, 0.78);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Courier Prime', 'Courier New', Courier, monospace;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  .video-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .scrim {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 35%, rgba(0,0,0,0.45) 100%);
  }

  .grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
  }

  .frame {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
  }

  .logo {
    font-family: 'Avenir Next', 'Avenir', 'Jost', system-ui, -apple-system, sans-serif;
    font-weight: 300;
    font-size: clamp(2.6rem, 12vw, 9rem);
    letter-spacing: 0.04em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0;
    transform: translateY(8px);
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.15s forwards;
  }

  .tagline {
    margin-top: 1rem;
    font-family: 'Courier Prime', 'Courier New', Courier, monospace;
    font-weight: 400;
    font-size: clamp(0.85rem, 1.6vw, 1.1rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0;
    transform: translateY(8px);
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) 0.4s forwards;
  }

  .statement {
    margin-top: 2.5rem;
    font-family: 'Courier Prime', 'Courier New', Courier, monospace;
    font-weight: 400;
    font-size: clamp(0.85rem, 1.15vw, 1rem);
    line-height: 1.65;
    letter-spacing: 0.02em;
    max-width: 34rem;
    color: var(--ink-soft);
    opacity: 0;
    transform: translateY(8px);
    animation: rise 1.2s cubic-bezier(.2,.7,.2,1) 0.65s forwards;
  }

  .footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: max(1.5rem, env(safe-area-inset-bottom, 1.5rem));
    z-index: 3;
    display: flex;
    justify-content: space-between;
    padding: 0 2rem;
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: 400;
    color: var(--ink-soft);
    opacity: 0;
    animation: fadeIn 1.4s ease 1s forwards;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Tablet */
  @media (max-width: 768px) {
    .frame { padding: 1.5rem 1.25rem; }
    .statement { margin-top: 2rem; max-width: 28rem; }
  }

  /* Phone */
  @media (max-width: 480px) {
    .frame { padding: 1.25rem 1rem; }
    .logo { letter-spacing: 0.015em; }
    .tagline { letter-spacing: 0.22em; font-size: 0.72rem; margin-top: 0.85rem; }
    .statement {
      margin-top: 2rem;
      font-size: 0.78rem;
      line-height: 1.7;
      letter-spacing: 0.015em;
      padding: 0 0.25rem;
    }
    .footer {
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      padding: 0 1.25rem;
    }
  }

  /* Small phone */
  @media (max-width: 360px) {
    .footer span:last-child { letter-spacing: 0.14em; }
  }

  /* Landscape phone — keep things visible */
  @media (max-height: 480px) and (orientation: landscape) {
    .logo { font-size: clamp(2rem, 8vw, 5rem); }
    .statement { margin-top: 1.25rem; font-size: 0.75rem; line-height: 1.5; }
    .footer { font-size: 0.55rem; bottom: 0.75rem; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .logo, .tagline, .statement, .footer {
      animation: none;
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>
<body>
  <video class="video-bg" autoplay muted loop playsinline preload="auto">
    <source src="sanrusan.mp4?v=2" type="video/mp4" />
  </video>
  <script>
    (() => {
      const v = document.querySelector('video.video-bg');
      const tryPlay = () => v.play().catch(() => {});
      v.addEventListener('canplay', tryPlay);
      v.addEventListener('loadeddata', tryPlay);
      document.addEventListener('visibilitychange', () => { if (!document.hidden) tryPlay(); });
      tryPlay();
    })();
  </script>
  <div class="scrim"></div>
  <div class="grain"></div>

  <main class="frame">
    <h1 class="logo">SANRUSAN</h1>
    <p class="tagline">Functional Art</p>
    <p class="statement">
      Objects that hold two truths at once.<br>
      are you stuck ?<br>
      art on one side, function on the other. A gallery for pieces that refuse to choose.
    </p>
  </main>

  <footer class="footer">
    <span>SANRUSAN</span>
    <span>Gallery / Est. 2026</span>
  </footer>
</body>
</html>
